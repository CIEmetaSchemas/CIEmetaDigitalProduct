<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CIE Metadatabase</title>
<style>
  :root{
    --cie-main:#004EBC;
    --cie-sec1:#0072CF;
    --cie-sec2:#679BDE;
    --cie-sec3:#A1BDEA;
    --ink:#12233b;
    --muted:#5b6b7f;
    --line:#d8e2f0;
    --bg:#f2f6fc;
    --panel:#ffffff;
    --ok:#1a7f4b;
    --warn:#b26a00;
    --err:#c0322b;
    --shadow:0 1px 3px rgba(0,32,80,.12),0 4px 16px rgba(0,32,80,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.45 "Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  header{background:var(--cie-main);color:#fff;display:flex;align-items:center;gap:14px;padding:8px 16px;box-shadow:var(--shadow);position:sticky;top:0;z-index:20}
  header img{height:34px;width:auto;background:#fff;border-radius:4px;padding:2px 4px}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.2px}
  header .sub{font-size:11px;opacity:.85;margin-top:1px}
  header .spacer{flex:1}
  header .user{font-size:12px;display:flex;align-items:center;gap:8px}
  header .user b{font-weight:600}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  button{font:inherit;cursor:pointer;border:1px solid var(--cie-main);background:var(--cie-main);color:#fff;border-radius:6px;padding:6px 12px;line-height:1.2}
  button:hover{background:var(--cie-sec1);border-color:var(--cie-sec1)}
  button.ghost{background:#fff;color:var(--cie-main)}
  button.ghost:hover{background:#eef4fd}
  button.sec{background:var(--cie-sec1);border-color:var(--cie-sec1)}
  button.danger{background:#fff;color:var(--err);border-color:var(--err)}
  button.danger:hover{background:#fbeeee}
  button:disabled{opacity:.45;cursor:not-allowed}
  button.small{padding:3px 8px;font-size:12px}
  input,select,textarea{font:inherit;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 8px;background:#fff;width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--cie-sec2);border-color:var(--cie-sec1)}
  textarea{resize:vertical;font-family:"Cascadia Code",Consolas,monospace;font-size:12.5px;line-height:1.4}
  .wrap{display:grid;grid-template-columns:minmax(320px,420px) 1fr;gap:0;height:calc(100vh - 96px)}
  .list-pane{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .list-filters{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .list-filters .row{display:flex;gap:8px}
  .list-scroll{overflow:auto;min-height:0;flex:1}
  table.entries{width:100%;border-collapse:collapse}
  table.entries th{position:sticky;top:0;background:#eaf1fb;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:7px 10px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
  table.entries td{padding:7px 10px;border-bottom:1px solid #eef2f8;vertical-align:top}
  table.entries tr{cursor:pointer}
  table.entries tr:hover td{background:#f6f9fe}
  table.entries tr.sel td{background:#e4eefb}
  .title-cell{font-weight:600;color:var(--ink)}
  .doi-cell{font-family:Consolas,monospace;font-size:11.5px;color:var(--muted)}
  a.doi-link{color:var(--cie-sec1);text-decoration:none;border-bottom:1px dotted var(--cie-sec2)}
  a.doi-link:hover{color:var(--cie-main);border-bottom-style:solid}
  .chip{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:10px;background:var(--cie-sec3);color:#0a2a52;margin:1px 3px 1px 0}
  .chip.dom{background:#e3ecfb;border:1px solid var(--cie-sec2)}
  .badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .badge.draft{background:#fdf0d8;color:#8a5b00}
  .badge.review{background:#e0ecfb;color:#0a4aa0}
  .badge.published{background:#dcf1e5;color:#12683f}
  .badge.fail{background:#fbe6e6;color:#9a2a24}
  .badge.dup{background:#f7d7d4;color:#8f2721;border:1px solid #e39a94}
  .db-warning{background:#fbe6e6;color:#8f2721;border-bottom:1px solid #e6b3b0;padding:9px 16px;font-size:13px}
  .db-warning b{font-weight:700}
  .db-warning a{color:#8f2721;text-decoration:underline;cursor:pointer;font-family:Consolas,monospace}
  .detail-pane{overflow:auto;min-height:0;padding:0}
  .empty{color:var(--muted);padding:40px;text-align:center}
  .detail-head{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 18px;z-index:5}
  .detail-head h2{margin:0 0 4px;font-size:17px}
  .detail-head .meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:12px}
  .detail-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 18px;background:var(--panel);position:sticky;top:0;z-index:4}
  .tabs button{border:none;background:none;color:var(--muted);border-radius:0;border-bottom:3px solid transparent;padding:9px 12px;font-weight:600}
  .tabs button.active{color:var(--cie-main);border-bottom-color:var(--cie-main)}
  .tabs button:hover{background:#f3f7fd}
  .tabpage{padding:16px 18px 60px}
  fieldset{border:1px solid var(--line);border-radius:8px;margin:0 0 16px;padding:12px 14px 14px;background:#fcfdff}
  legend{font-weight:600;color:var(--cie-main);padding:0 6px;font-size:13px}
  .grid{display:grid;grid-template-columns:180px 1fr;gap:8px 12px;align-items:start}
  .grid label{color:var(--muted);padding-top:6px;font-size:12.5px}
  .arr-item{border:1px solid var(--line);border-radius:7px;padding:10px;margin:8px 0;background:#fff;position:relative}
  .arr-item .rm{position:absolute;top:8px;right:8px}
  .arr-grid{display:grid;grid-template-columns:150px 1fr;gap:6px 10px;align-items:start}
  .arr-grid label{color:var(--muted);padding-top:6px;font-size:12px}
  .add-btn{margin-top:6px}
  .hint{font-size:11.5px;color:var(--muted);margin:2px 0 0}
  .val-list{list-style:none;margin:0;padding:0}
  .val-list li{padding:6px 10px;border-radius:6px;margin:4px 0;font-size:12.5px}
  .val-list li.e{background:#fbeeee;color:#8f2721;border:1px solid #f0cfcd}
  .val-list li.w{background:#fdf5e3;color:#7a5300;border:1px solid #f0e2bf}
  .val-ok{background:#e7f6ee;color:#12683f;border:1px solid #bfe6cf;padding:8px 12px;border-radius:6px;font-weight:600}
  .hist-item{border-left:3px solid var(--cie-sec2);padding:6px 12px;margin:8px 0;background:#fafcff}
  .hist-item .h{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .hist-item .rev{font-weight:700;color:var(--cie-main)}
  .hist-item .who{color:var(--muted);font-size:12px}
  .hist-item .cmt{margin:3px 0 0}
  .diff{font-family:Consolas,monospace;font-size:12px;background:#f4f7fc;border:1px solid var(--line);border-radius:6px;padding:6px 8px;margin-top:6px;white-space:pre-wrap;word-break:break-word}
  .diff .op-add{color:var(--ok)}
  .diff .op-remove{color:var(--err)}
  .diff .op-replace{color:var(--cie-sec1)}
  .modal-bg{position:fixed;inset:0;background:rgba(12,30,60,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{background:#fff;border-radius:10px;box-shadow:var(--shadow);max-width:820px;width:100%;max-height:86vh;overflow:auto;padding:20px 22px}
  .modal h3{margin:0 0 12px;color:var(--cie-main)}
  .modal .foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .helpdoc{font-size:13px;line-height:1.5;color:var(--ink)}
  .helpdoc h4{margin:15px 0 4px;color:var(--cie-main)}
  .helpdoc ul{margin:4px 0;padding-left:20px}
  .helpdoc li{margin:3px 0}
  .helpdoc code{background:#f0f4fa;padding:1px 4px;border-radius:4px;font-size:12px}
  .helpdoc a{color:var(--cie-sec1)}
  .cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .conflict{border:1px solid var(--line);border-radius:8px;padding:10px;margin:10px 0}
  .conflict h4{margin:0 0 6px}
  .side{border:1px solid var(--line);border-radius:6px;padding:8px;background:#fafcff;max-height:220px;overflow:auto}
  .side pre{margin:0;font-size:11.5px;white-space:pre-wrap;word-break:break-word}
  .side.pick{outline:2px solid var(--cie-main)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;box-shadow:var(--shadow);z-index:200;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.err{background:var(--err)}
  .toast.ok{background:var(--ok)}
  .toast.warn{background:var(--warn)}
  .kv{font-size:12px;color:var(--muted)}
  .divmgr .arr-item{display:flex;gap:8px;align-items:center}
  .divmgr .arr-item input{width:auto}
  .divmgr .arr-item input.code{width:80px}
  .filesel{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .csv-summary{font-family:Consolas,monospace;font-size:12px;background:#f4f7fc;border:1px solid var(--line);border-radius:6px;padding:8px 10px;white-space:pre-wrap}
  .mono{font-family:Consolas,monospace}
  .warnrow{background:#fdf5e3;border:1px solid #f0e2bf;border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:12.5px;color:#7a5300}
</style>
</head>

function defaults(){ return (DB && DB.defaults) || DEFAULT_VALUES; }
function defCreator(){ const d=defaults(); return {name:d.creatorName||"", nameType:d.creatorNameType||"Organizational"}; }
function defRights(){ const d=defaults(); const r={rights:d.rights||""}; if(d.rightsURI)r.rightsURI=d.rightsURI; if(d.rightsIdentifier)r.rightsIdentifier=d.rightsIdentifier; return r; }
/* apply the default-managed fields onto a payload (used by "Revert to defaults") */
function applyDefaultsToPayload(p){
  const d=defaults();
  p.creators=[defCreator()];
  p.publisher=d.publisher||"";
  p.language=d.language||"";
  p.formats=[d.format||"text/csv"];
  p.types={resourceType:d.resourceType||"", resourceTypeGeneral:d.resourceTypeGeneral||"Dataset"};

  p.datatableInfo.extrapolationMethod=d.extrapolationMethod||"";

  dv.setUint32(total-4,(ml*8)>>>0,false);

  for(let off=0;off<total;off+=64){
    for(let j=0;j<16;j++)w[j]=dv.getUint32(off+j*4,false);

/* ============================================================================
   JSON Pointer + RFC-6902 patch (apply + generate diff)
   ==========================================================================*/
function ptrTokens(path){
  if(path==="") return [];
  return path.split("/").slice(1).map(t=>t.replace(/~1/g,"/").replace(/~0/g,"~"));
}
function applyPatch(doc, patch){
  let root = clone(doc);
  for(const op of patch){
    const toks=ptrTokens(op.path);
    if(toks.length===0){
      if(op.op==="add"||op.op==="replace"){ root=clone(op.value); continue; }
      if(op.op==="remove"){ root=null; continue; }
    }
    let parent=root;
    for(let i=0;i<toks.length-1;i++){
      const k=Array.isArray(parent)?parseInt(toks[i],10):toks[i];
      parent=parent[k];
    }
    const last=toks[toks.length-1];
    if(Array.isArray(parent)){
      const idx = last==="-"?parent.length:parseInt(last,10);
      if(op.op==="add") parent.splice(idx,0,clone(op.value));
      else if(op.op==="replace") parent[idx]=clone(op.value);
      else if(op.op==="remove") parent.splice(idx,1);
    }else{
      if(op.op==="add"||op.op==="replace") parent[last]=clone(op.value);
      else if(op.op==="remove") delete parent[last];
    }
  }
  return root;
}
/* generate a readable field-level diff. Objects recurse; arrays & scalars replaced whole. */
function diffPatch(a, b, base){
  base = base||"";
  const ops=[];
  const isObj=x=>x&&typeof x==="object"&&!Array.isArray(x);
  if(isObj(a)&&isObj(b)){
    for(const k of Object.keys(a)){
      if(!(k in b)) ops.push({op:"remove",path:base+"/"+esc6902(k)});
    }
    for(const k of Object.keys(b)){
      const p=base+"/"+esc6902(k);
      if(!(k in a)) ops.push({op:"add",path:p,value:clone(b[k])});
      else ops.push(...diffPatch(a[k],b[k],p));
    }
  }else{
    if(canonical(a)!==canonical(b)) ops.push({op:"replace",path:base,value:clone(b)});
  }
  return ops;
}
function esc6902(k){ return String(k).replace(/~/g,"~0").replace(/\//g,"~1"); }
/* reconstruct payload at revision rev (1-based) from history forward patches */
function reconstruct(history, rev){
  let doc={};
  for(let i=0;i<rev && i<history.length;i++) doc=applyPatch(doc, history[i].patch);
  return doc;
}

/* ============================================================================
   Minimal draft-07 validator for the embedded CIE schema
   ==========================================================================*/
function validate(payload, schema){
  const root=schema;
  function resolve(ref){
    const parts=ref.replace(/^#\//,"").split("/");
    let s=root; for(const p of parts) s=s[p]; return s;
  }
  function typeOf(v){
    if(v===null) return "null";
    if(Array.isArray(v)) return "array";
    return typeof v;
  }
  function typeOk(v, t){
    if(t==="integer") return typeof v==="number" && Number.isInteger(v);
    if(t==="number") return typeof v==="number";
    return typeOf(v)===t;
  }
  function chk(v, sch, path){
    if(!sch) return [];
    if(sch.$ref) return chk(v, resolve(sch.$ref), path);
    const errs=[];
    if(sch.anyOf){
      for(const s of sch.anyOf){ if(chk(v,s,path).length===0) return []; }
      return [`${path||"(root)"}: value not allowed here`];
    }
    if(sch.const!==undefined && canonical(v)!==canonical(sch.const))
      errs.push(`${path||"(root)"}: must equal ${JSON.stringify(sch.const)}`);
    if(sch.enum && !sch.enum.some(e=>canonical(e)===canonical(v)))
      errs.push(`${path||"(root)"}: "${v}" is not an allowed value`);
    if(sch.type){
      if(!typeOk(v, sch.type)){
        errs.push(`${path||"(root)"}: expected ${sch.type}, got ${typeOf(v)}`);
        return errs;
      }
    }
    if(Array.isArray(v)){
      if(sch.minItems!=null && v.length<sch.minItems) errs.push(`${path}: needs at least ${sch.minItems} item(s)`);
      if(sch.uniqueItems){
        const seen=new Set();
        for(const it of v){ const c=canonical(it); if(seen.has(c)){ errs.push(`${path}: items must be unique`); break; } seen.add(c); }
      }
      if(sch.items) v.forEach((it,i)=>errs.push(...chk(it,sch.items,`${path}[${i}]`)));
    }
    if(v&&typeof v==="object"&&!Array.isArray(v)){
      if(sch.required) for(const r of sch.required) if(!(r in v)) errs.push(`${path||"(root)"}: missing required "${r}"`);
      if(sch.properties) for(const k of Object.keys(v)) if(sch.properties[k]) errs.push(...chk(v[k],sch.properties[k],`${path?path+".":""}${k}`));
    }
    return errs;
  }
  return chk(payload, root, "");
}

      language:{type:"string"},
      alternateIdentifiers:{type:"array",items:{type:"object",properties:{alternateIdentifier:{type:"string"},alternateIdentifierType:{type:"string"}},required:["alternateIdentifier","alternateIdentifierType"]}},
      relatedIdentifiers:{type:"array",items:{type:"object",properties:{relatedIdentifier:{type:"string"},relatedIdentifierType:strEnum(D.relatedIdentifierType),relationType:strEnum(D.relationType),resourceTypeGeneral:strEnum(D.resourceTypeGeneral)},required:["relatedIdentifier","relatedIdentifierType","relationType"]}},
      sizes:{type:"array",items:{type:"string"}},

      rightsList:{type:"array",items:{type:"object",properties:{rights:{type:"string"},rightsURI:{type:"string"},rightsIdentifier:{type:"string"},rightsIdentifierScheme:{type:"string"},schemeURI:{type:"string"},lang:{type:"string"}}}},
      descriptions:{type:"array",items:{type:"object",properties:{description:{type:"string"},descriptionType:strEnum(D.descriptionType),lang:{type:"string"}},required:["description","descriptionType"]}},

      schemaName:{type:"string",const:"CIEmetaDigitalProduct"},
      schemaVersion:{type:"number",const:4},
      schemaURL:{type:"string",const:APP.SCHEMA_URL},
      metadataRevision:{type:"integer",minimum:1},

        interpolationMethod:strEnum(D.interpolationMethod),

/* create a new entry committed at rev 1 */
function createEntry(payload, opts){
  opts=opts||{};
  if(payload && payload.metadataRevision==null) payload.metadataRevision=1; // metadata-file revision starts at 1
  const now=nowISO(), user=currentUser();
  const patch=diffPatch({}, payload, "");
  const e={
    entryId:uuid(), rev:1, contentHash:contentHash(payload),
    status:opts.status||"draft",
    landingPage:opts.landingPage||"",
    domains:opts.domains||[],
    audit:{createdBy:user, createdDate:now, modifiedBy:user, modifiedDate:now, modifiedComment:opts.comment||"Created"},
    payload:clone(payload),
    history:[{rev:1, by:user, date:now, comment:opts.comment||"Created", baseHash:null, patch:patch}]
  };
  return e;
}
/* payload diff for change detection: ignores the bookkeeping metadataRevision field so it never
   triggers (or suppresses) a revision on its own */
function contentDiff(a,b){ const x=clone(a||{}),y=clone(b||{}); delete x.metadataRevision; delete y.metadataRevision; return diffPatch(x,y,""); }
/* commit an edit to an existing entry */
function commitEdit(entry, newPayload, comment){
  const now=nowISO(), user=currentUser();
  const oldPayload=entry.payload;
  if(contentDiff(oldPayload, newPayload).length===0) return false; // no genuine content change
  entry.rev+=1;
  const stored=clone(newPayload);
  stored.metadataRevision=entry.rev;                 // metadata-file revision follows the payload rev
  const patch=diffPatch(oldPayload, stored, "");      // history/reconstruct include the metadataRevision bump
  entry.history.push({rev:entry.rev, by:user, date:now, comment:comment||"", baseHash:entry.contentHash, patch:patch});
  entry.payload=stored;
  entry.contentHash=contentHash(stored);
  entry.audit.modifiedBy=user; entry.audit.modifiedDate=now; entry.audit.modifiedComment=comment||"";
  return true;
}

function parseCsv(text){
  // strip BOM, normalise newlines, split, drop trailing empty lines
  text=text.replace(/^﻿/,"");
  const lines=text.split(/\r\n|\n|\r/);
  while(lines.length && lines[lines.length-1].trim()==="") lines.pop();
  const rows=lines.map(l=>l.split(","));
  return {lines, rows};
}
/* ---- exact decimal column sums (BigInt fixed-point, zero rounding error) ----
   The CSV values are finite decimal strings, i.e. exact rationals m*10^-k. Scaling a
   whole column to a common power of ten turns every value into an integer, and BigInt
   addition of integers is exact by construction -- no IEEE-754 rounding ever occurs. */
/* parse a plain/scientific decimal to {sign,digits,scale} with value = sign*digits*10^-scale; null if not numeric */
function parseDecimal(s){
  s=String(s).trim();
  const m=s.match(/^([+-]?)(\d*)(?:\.(\d*))?(?:[eE]([+-]?\d+))?$/);
  if(!m) return null;
  const intp=m[2]||"", frac=m[3]||"";
  if(intp===""&&frac==="") return null;                  // "", ".", or sign only
  let digits=(intp+frac).replace(/^0+(?=\d)/,"");        // drop leading zeros, keep at least one
  if(digits==="") digits="0";
  const scale=frac.length-(m[4]?parseInt(m[4],10):0);    // value = digits*10^-scale
  return {sign:(m[1]==="-")?-1n:1n, digits:BigInt(digits), scale};
}
/* render sign*|total|*10^-D (D>=0) as an exact decimal string */
function scaledToDecimal(total, D){
  const neg=total<0n; let t=(neg?-total:total).toString();
  if(D>0){ t=t.padStart(D+1,"0"); t=t.slice(0,-D)+"."+t.slice(-D); }
  return (neg?"-":"")+t;
}
/* exact per-column sums; each entry is a decimal string, or null if the column is not all-numeric */
function exactColumnSums(rows, nCols){
  const out=new Array(nCols).fill(null);
  for(let c=0;c<nCols;c++){
    let D=0, valid=true; const cells=[];
    for(const r of rows){
      const cell=(r[c]==null?"":String(r[c]).trim());
      if(cell==="") continue;                            // skip blanks (same as the double path)
      const d=parseDecimal(cell);
      if(!d){ valid=false; break; }                      // non-numeric cell -> no exact sum for this column
      cells.push(d); if(d.scale>D) D=d.scale;
    }
    if(!valid) continue;
    let total=0n;
    for(const d of cells) total += d.sign * d.digits * (10n ** BigInt(D-d.scale));
    out[c]=scaledToDecimal(total, D);
  }
  return out;
}
/* decimals in a written number; strip trailing zeros; round an exact decimal string (half-up) to n places */
function decimalsOf(s){ s=String(s).trim(); const i=s.indexOf("."); return i<0?0:(s.length-i-1); }
function normDec(s){ s=String(s).trim(); if(s.indexOf(".")>=0) s=s.replace(/0+$/,"").replace(/\.$/,""); return (s===""||s==="-0"||s==="-")?"0":s; }
function roundDecimalStr(s, n){
  const d=parseDecimal(s); if(!d) return s;
  let {sign,digits,scale}=d;
  if(scale<=n){ digits=digits*(10n**BigInt(n-scale)); }
  else { const p=10n**BigInt(scale-n), r=digits%p; digits=digits/p+((2n*r>=p)?1n:0n); }
  let t=digits.toString(), out;
  if(n>0){ t=t.padStart(n+1,"0"); out=t.slice(0,-n)+"."+t.slice(-n); } else out=t;
  return ((sign<0n && digits!==0n)?"-":"")+out;
}
function analyzeCsv(text){
  const {lines, rows}=parseCsv(text);
  const nRows=rows.length;
  const nCols=nRows?rows[0].length:0;
  const sums=new Array(nCols).fill(0);
  const sumsValid=new Array(nCols).fill(true);   // true = column is numeric (every non-empty cell finite)
  for(const r of rows){
    for(let c=0;c<nCols;c++){
      const cell=(r[c]==null?"":String(r[c]).trim());
      const v=parseFloat(cell);
      if(Number.isFinite(v)) sums[c]+=v;
      else if(cell!=="") sumsValid[c]=false;      // non-empty, non-numeric cell -> column not numeric
    }
  }
  const allNumeric=nCols>0 && sumsValid.every(Boolean);
  const sumsExact=exactColumnSums(rows, nCols);   // exact decimal sums (BigInt), null per non-numeric column
  // wavelength info from column 0
  let wl=null;
  if(nCols>0 && nRows>=2){
    const col0=rows.map(r=>parseFloat(r[0]));
    if(col0.every(Number.isFinite)){
      const first=col0[0], last=col0[col0.length-1];
      let step=col0[1]-col0[0], uniform=true;
      for(let i=1;i<col0.length;i++){ if(Math.abs((col0[i]-col0[i-1])-step)>1e-9){ uniform=false; break; } }
      wl={first,last,step:uniform?step:null,uniform};
    }
  }
  return {nRows,nCols,sums,sumsExact,sumsValid,allNumeric,lines,rows,wl};
}
/* map a file name to a MIME type for the formats[] field */
function mimeFromName(name, fallbackType){
  const ext=(String(name||"").match(/\.([^.\/\\]+)$/)||[,""])[1].toLowerCase();
  const map={csv:"text/csv", txt:"text/plain", tsv:"text/tab-separated-values",
    json:"application/json", xml:"application/xml", pdf:"application/pdf",
    xlsx:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    xls:"application/vnd.ms-excel", zip:"application/zip", dat:"text/plain",
    png:"image/png", jpg:"image/jpeg", jpeg:"image/jpeg", tif:"image/tiff", tiff:"image/tiff"};
  return map[ext] || fallbackType || "application/octet-stream";
}
/* fill payload fields from a CSV/file analysis; shared by the New-entry dialog and the
   Validation tab's "Fill…" button. mode: "csvWavelength" | "csv" | "other".
   For "other", `a` may be null (only checksums, fileName and format are set). */
function applyCsvToPayload(p, a, opts){
  opts=opts||{};
  const {md5, sha, filename, mode}=opts;
  // checksums (whenever we have hashes)
  if(md5 && sha) p.checksums=[{hashMethod:"md5",checksum:md5},{hashMethod:"sha256",checksum:sha}];
  // fileName alternateIdentifier
  if(filename){
    p.alternateIdentifiers=p.alternateIdentifiers||[];
    if(!p.alternateIdentifiers.some(x=>x.alternateIdentifierType==="fileName"))
      p.alternateIdentifiers.push({alternateIdentifier:filename,alternateIdentifierType:"fileName"});
  }
  if(mode==="other"){
    p.formats=[mimeFromName(filename, opts.fileType)];
    return;
  }
  if(!a) return;
  p.formats=["text/csv"];
  p.datatableInfo=p.datatableInfo||{};
  const rowN=Math.max(1,Math.min(a.nRows, parseInt(opts.sampleRow,10)|| (a.nRows>=120?120:Math.max(1,Math.ceil(a.nRows/2)))));
  // sums: always for wavelength/data tables; for a plain headerless CSV only when numeric
  const wantSums = mode==="csvWavelength" || a.allNumeric;
  const vals=[];
  if(wantSums){ const parts=a.sums.map((x,i)=>(a.sumsExact&&a.sumsExact[i]!=null)?a.sumsExact[i]:fmtNum(x));
    vals.push({validationType:"sumOfColumns",validationValue:"["+parts.join(",")+"]"}); }
  vals.push({validationType:"sampleRow",validationParameter:String(rowN),validationValue:a.lines[rowN-1]||""});
  vals.push({validationType:"numberOfRows",validationValue:String(a.nRows)});
  vals.push({validationType:"numberOfColumns",validationValue:String(a.nCols)});
  p.datatableInfo.validations=vals;
  if(mode==="csvWavelength" && a.wl){
    p.datatableInfo.columnHeaders=p.datatableInfo.columnHeaders||[];
    while(p.datatableInfo.columnHeaders.length<a.nCols) p.datatableInfo.columnHeaders.push({title:"",quantity:"",unit:""});
    const c0=p.datatableInfo.columnHeaders[0];
    c0.wavelength_first=a.wl.first; c0.wavelength_last=a.wl.last;
    if(a.wl.uniform) c0.wavelength_step=a.wl.step;
  }
}
function readFileBytes(file){
  return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(new Uint8Array(fr.result)); fr.onerror=rej; fr.readAsArrayBuffer(file); });
}

const COLUMN_HEADER_FIELD_LABELS=["Title","Quantity","Unit","Description","Wavelength first","Wavelength last","Wavelength step"];
const COLUMN_HEADER_FIELD_KEYS=["title","quantity","unit","description","wavelength_first","wavelength_last","wavelength_step"];
function parseColumnHeaderPaste(text){
  let lines=text.replace(/\r\n?/g,"\n").split("\n");
  while(lines.length && lines[lines.length-1].trim()==="") lines.pop();
  if(!lines.length) return null;
  let rows=lines.map(l=>l.split("\t"));
  if(rows.length && (rows[0][0]||"").trim().toLowerCase()==="title") rows=rows.map(r=>r.slice(1));
  if(rows.length<7) return null;
  rows=rows.slice(0,7);
  const n=Math.max(...rows.map(r=>r.length));
  const out=[];
  for(let i=0;i<n;i++){
    const obj={};
    COLUMN_HEADER_FIELD_KEYS.forEach((key,rowIdx)=>{
      const cell=(rows[rowIdx][i]||"").trim();
      if(key==="title"||key==="quantity"||key==="unit"){ obj[key]=cell; }
      else if(key==="description"){ if(cell!=="") obj[key]=cell; }
      else{ if(cell!=="") obj[key]=cell.startsWith(":")?cell:parseFloat(cell); }
    });
    out.push(obj);
  }
  return out;
}
function columnHeadersToTsv(arr){
  return COLUMN_HEADER_FIELD_KEYS.map((key,rowIdx)=>{
    const cells=arr.map(it=>it[key]==null?"":String(it[key]));
    return [COLUMN_HEADER_FIELD_LABELS[rowIdx],...cells].join("\t");
  }).join("\n");
}

/* ---- validation against CSV ---- */
function renderValidate(page,e){
  const info=document.createElement("div"); info.className="warnrow";
  info.textContent="Pick the CSV data file (header-less, comma-separated per RFC 4180). The tool computes md5+sha256, row/column counts, per-column sums, a sample row and the wavelength range from column 1, checks them (and the file name) against the metadata, and lets you GENERATE/fill the metadata or LOG the result to the entry.";
  page.appendChild(info);

  const fsel=document.createElement("div"); fsel.className="filesel"; fsel.style.marginBottom="12px";
  const file=document.createElement("input"); file.type="file"; file.accept=".csv,text/csv"; file.style.maxWidth="360px";
  fsel.appendChild(file); page.appendChild(fsel);

  // Expected file name (from the fileName alternateIdentifier), if known.
  // Browsers do not allow pre-selecting/defaulting a path in the native Open
  // dialog, so we surface it as a hint instead and warn if the pick differs.
  const expected=entryFilename(e);
  const nameHint=document.createElement("div"); nameHint.className="hint"; nameHint.style.marginBottom="12px";
  if(expected){
    nameHint.innerHTML=`Expected file name: <code>${esc(expected)}</code> `+
      `<button class="ghost" type="button" style="padding:2px 8px">Copy name</button>`;
    nameHint.querySelector("button").onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(expected); toast("File name copied","ok"); };
    page.appendChild(nameHint);
  }

  const out=document.createElement("div"); page.appendChild(out);

  file.onchange=async()=>{
    if(!file.files||!file.files[0]) return;
    const f=file.files[0];
    const bytes=await readFileBytes(f);
    const md5=md5Bytes(bytes), sha=sha256Bytes(bytes);
    const text=new TextDecoder("utf-8").decode(bytes);
    const a=analyzeCsv(text);
    renderCsvResult(out,e,f.name,md5,sha,a);
  };

  renderValidationLog(page,e);
}
function renderValidationLog(page,e){

  if(!log.length){
    const p=document.createElement("p"); p.className="hint";

    fs.appendChild(p);

      const d=document.createElement("details"); d.style.margin="6px 0";

      s.innerHTML=`<span class="badge ${rec.passed?"published":"fail"}">${rec.passed?"PASS":"FAIL"}</span> `+
        `${esc((rec.date||"").replace("T"," ").slice(0,19))} · ${esc(rec.by||"")} · <span class="mono">${esc(rec.fileName||"")}</span>${fails?` · ${fails} fail(s)`:""}`;
      d.appendChild(s);

      d.appendChild(ul); fs.appendChild(d);
    });
  }
  page.appendChild(fs);

function numClose(a,b){ if(!Number.isFinite(a)||!Number.isFinite(b)) return false; const s=Math.max(Math.abs(a),Math.abs(b),1); return Math.abs(a-b)<=s*1e-6; }
function renderCsvResult(out,e,filename,md5,sha,a){
  const p=editModel;
  out.innerHTML="";
  const sum=document.createElement("div"); sum.className="csv-summary";
  sum.textContent=
    `file: ${filename}\nrows: ${a.nRows}\ncolumns: ${a.nCols}\n`+
    `md5:    ${md5}\nsha256: ${sha}\n`+
    `column sums: [${a.sums.map((x,i)=>(a.sumsExact&&a.sumsExact[i]!=null)?a.sumsExact[i]:fmtNum(x)).join(", ")}]\n`+
    (a.wl?`wavelength (col 1): first=${a.wl.first} last=${a.wl.last} step=${a.wl.uniform?a.wl.step:"(non-uniform)"}\n`:"");
  out.appendChild(sum);

  // CHECK panel — collect results into an array so they can also be logged
  const cs=(p.checksums||[]);
  const vs=(p.datatableInfo&&p.datatableInfo.validations)||[];
  const chs=(p.datatableInfo&&p.datatableInfo.columnHeaders)||[];
  const checks=[];
  const push=(key,status,text)=>checks.push({key,status,text});
  // checksums
  ["md5","sha256"].forEach(method=>{
    const val=method==="md5"?md5:sha;
    const stored=cs.find(c=>(c.hashMethod||"").toLowerCase()===method);
    if(!stored){ push(method,"warn",`${method}: no stored checksum`); return; }
    const m=(stored.checksum||"").toLowerCase()===val.toLowerCase();
    push(method,m?"pass":"fail",`${method}: ${m?"match":"MISMATCH (stored "+stored.checksum+")"}`);
  });
  // file name vs alternateIdentifier (type fileName)
  const metaFile=(p.alternateIdentifiers||[]).find(x=>x.alternateIdentifierType==="fileName");
  if(metaFile){ const m=(metaFile.alternateIdentifier||"")===filename;
    push("fileName",m?"pass":"fail",`fileName: ${m?"match":'MISMATCH (metadata "'+metaFile.alternateIdentifier+'", file "'+filename+'")'}`); }
  else push("fileName","warn","fileName: none stored in metadata");
  // numeric / structural validations
  const vRows=vs.find(v=>v.validationType==="numberOfRows");
  if(vRows){ const m=String(a.nRows)===String(vRows.validationValue).trim(); push("numberOfRows",m?"pass":"fail",`numberOfRows: ${m?"match":"MISMATCH (stored "+vRows.validationValue+")"}`); }
  const vCols=vs.find(v=>v.validationType==="numberOfColumns");
  if(vCols){ const m=String(a.nCols)===String(vCols.validationValue).trim(); push("numberOfColumns",m?"pass":"fail",`numberOfColumns: ${m?"match":"MISMATCH (stored "+vCols.validationValue+")"}`); }
  const vSum=vs.find(v=>v.validationType==="sumOfColumns");
  if(vSum){
    // Parse the stored array as raw decimal token STRINGS -- never via JSON.parse, whose
    // numbers would be coerced to IEEE-754 doubles and lose the exact decimal digits.
    const sv=String(vSum.validationValue).trim();
    const raw=(sv.startsWith("[")&&sv.endsWith("]")) ? sv.slice(1,-1).split(",").map(t=>t.trim()).filter(t=>t!=="") : null;
    if(raw){
      const exact=a.sumsExact||[];
      // strict exact: the stored decimal must equal the exact BigInt sum rounded to its own
      // decimal places (fall back to numClose only for a column that is not exactly summable)
      const cmp=(tok,i)=> (exact[i]!=null)
        ? normDec(roundDecimalStr(exact[i], decimalsOf(tok)))===normDec(tok)
        : numClose(Number(tok), a.sums[i]);
      const m=raw.length===a.sums.length && raw.every(cmp);
      const computed="["+a.sums.map((x,i)=>(exact[i]!=null)?exact[i]:fmtNum(x)).join(",")+"]";
      push("sumOfColumns",m?"pass":"fail",`sumOfColumns: ${m?"match":"MISMATCH (stored "+vSum.validationValue+", computed "+computed+")"}`); } }
  const vSample=vs.find(v=>v.validationType==="sampleRow");
  if(vSample && vSample.validationParameter){ const idx=parseInt(vSample.validationParameter,10)-1; const line=a.lines[idx];
    const m=line!==undefined && line.trim()===String(vSample.validationValue).trim();
    push("sampleRow",m?"pass":"fail",`sampleRow[${vSample.validationParameter}]: ${m?"match":"MISMATCH (stored "+vSample.validationValue+", file "+(line===undefined?"(no such row)":line)+")"}`); }
  // wavelength vs columnHeaders (sentinel strings like ":unap" mean "no wavelengths in this table" — skip)
  if(a.wl && chs[0]){
    const c0=chs[0];
    if(typeof c0.wavelength_first==="number"){ const m=numClose(c0.wavelength_first,a.wl.first); push("wavelength_first",m?"pass":"fail",`col1 wavelength_first: ${m?"match":"MISMATCH (meta "+c0.wavelength_first+", file "+a.wl.first+")"}`); }
    if(typeof c0.wavelength_last==="number"){ const m=numClose(c0.wavelength_last,a.wl.last); push("wavelength_last",m?"pass":"fail",`col1 wavelength_last: ${m?"match":"MISMATCH (meta "+c0.wavelength_last+", file "+a.wl.last+")"}`); }
  }
  if(a.nCols && chs.length && a.nCols!==chs.length) push("columnHeaders","warn",`columnHeaders count (${chs.length}) differs from CSV columns (${a.nCols})`);
  if(!checks.length) push("","warn","No stored checksums/validations to check — use Generate below.");

  const chk=document.createElement("fieldset"); chk.innerHTML="<legend>Check against metadata</legend>";
  const ul=document.createElement("ul"); ul.className="val-list";
  const clsOf=s=>s==="pass"?"ok":s==="fail"?"e":"w";
  checks.forEach(c=>ul.appendChild(li(clsOf(c.status),c.text)));
  chk.appendChild(ul);
  const logBtn=document.createElement("button"); logBtn.className="ghost"; logBtn.style.marginTop="8px";
  logBtn.textContent="Log this validation to the entry";
  logBtn.title="Store these results with date and editor in the entry's validation log (saved in the database)";
  logBtn.onclick=()=>{
    const passed=checks.every(c=>c.status!=="fail");
    const rec={date:nowISO(), by:currentUser(), fileName:filename, md5:md5, sha256:sha, passed:passed,
      results:checks.map(c=>({check:c.key||"", status:c.status, detail:c.text}))};
    e.validationLog=e.validationLog||[]; e.validationLog.push(rec); persist();
    toast("Validation logged to entry ("+(passed?"PASS":"FAIL")+")", passed?"ok":"err");
    renderDetail();
  };
  chk.appendChild(logBtn);
  out.appendChild(chk);

  // GENERATE panel
  const gen=document.createElement("fieldset"); gen.innerHTML="<legend>Generate / fill metadata</legend>";
  const existingSample=vs.find(v=>v.validationType==="sampleRow" && v.validationParameter);
  const defRow = existingSample
    ? Math.max(1, Math.min(a.nRows, parseInt(existingSample.validationParameter,10)||1))
    : (a.nRows>=120 ? 120 : Math.max(1, Math.ceil(a.nRows/2)));
  const p1=document.createElement("p"); p1.className="hint";
  p1.textContent = existingSample
    ? `Sample row (1-based) — reusing the row already stored in the metadata (${defRow}); change only if intended:`
    : `Sample row (1-based) — auto-chosen (${defRow}); for files with fewer than 120 rows the middle row is used, otherwise row 120. Adjust if needed:`;
  const rowInp=document.createElement("input"); rowInp.type="number"; rowInp.value=defRow; rowInp.min=1; rowInp.max=a.nRows; rowInp.style.maxWidth="120px";
  const btn=document.createElement("button"); btn.className="sec"; btn.textContent="Fill checksums, validations & wavelength range";
  btn.onclick=()=>{
    applyCsvToPayload(p, a, {md5, sha, filename, mode:"csvWavelength", sampleRow:rowInp.value});
    markDirty(); toast("Metadata fields filled from CSV — review and Save entry","ok");
    activeTab="form"; renderDetail();
  };
  gen.appendChild(p1); gen.appendChild(rowInp); gen.appendChild(document.createElement("br")); gen.appendChild(document.createElement("br")); gen.appendChild(btn);
  out.appendChild(gen);
}
function li(cls,txt){ const x=document.createElement("li"); x.className=cls==="ok"?"":cls; if(cls==="ok"){x.style.background="#e7f6ee";x.style.color="#12683f";x.style.border="1px solid #bfe6cf";} x.textContent=(cls==="ok"?"✓ ":cls==="e"?"✗ ":"! ")+txt; return x; }
function fmtNum(x){ if(!Number.isFinite(x)) return "0"; if(Number.isInteger(x)) return String(x); return String(Number(x.toPrecision(15))); }

/* ---- history ---- */
function renderHistory(page,e){
  const info=document.createElement("p"); info.className="hint";
  info.textContent="Newest first. Each revision stores the field-level change (RFC-6902 JSON-Patch) from the previous one; earlier revisions are reconstructed by replaying patches.";
  page.appendChild(info);
  const hist=e.history.slice().reverse();
  for(const h of hist){
    const box=document.createElement("div"); box.className="hist-item";
    const head=document.createElement("div"); head.className="h";
    head.innerHTML=`<span class="rev">rev ${h.rev}</span><span class="who">${esc(h.by)} · ${esc((h.date||"").replace("T"," ").slice(0,19))}</span>`;
    box.appendChild(head);
    if(h.comment){ const c=document.createElement("div"); c.className="cmt"; c.textContent=h.comment; box.appendChild(c); }
    const prev = h.rev>1 ? reconstruct(e.history, h.rev-1) : {};
    const diff=document.createElement("div"); diff.className="diff"; diff.innerHTML=renderDiff(h.patch,h.rev,prev); box.appendChild(diff);
    if(h.rev<e.rev){
      const rb=document.createElement("button"); rb.className="ghost small"; rb.style.marginTop="6px"; rb.textContent="Restore this revision";
      rb.onclick=()=>{ const old=reconstruct(e.history,h.rev); editModel=old; markDirty(); toast(`Loaded rev ${h.rev} into editor — Save to commit as new revision`,"ok"); activeTab="form"; renderDetail(); };
      box.appendChild(rb);
    }
    page.appendChild(box);
  }
}
function getAtPointer(doc, path){
  const toks=ptrTokens(path); let cur=doc;
  for(const t of toks){ if(cur==null) return undefined; cur=Array.isArray(cur)?cur[parseInt(t,10)]:cur[t]; }
  return cur;
}
function renderDiff(patch,rev,prev){
  if(rev===1) return '<span class="op-add">+ initial content imported/created</span>';
  return patch.map(op=>{
    const path=esc(op.path);
    const old=getAtPointer(prev, op.path);
    if(op.op==="add") return `<span class="op-add">+ add ${path} = ${esc(shortVal(op.value))}</span>`;
    if(op.op==="remove") return `<span class="op-remove">− remove ${path} (was: ${esc(shortVal(old))})</span>`;
    if(op.op==="replace") return `<span class="op-replace">~ ${path}: ${esc(shortVal(old))} → ${esc(shortVal(op.value))}</span>`;
    return esc(JSON.stringify(op));
  }).join("\n");
}
function shortVal(v){ if(v===undefined) return "∅"; const s=typeof v==="string"?v:JSON.stringify(v); return s.length>120?s.slice(0,117)+"…":s; }

/* ---- entry actions ---- */
function revertToDefaults(){
  if(!editModel) return;
  const labels=DEFAULT_FIELDS.map(f=>f.label).join(", ");
  if(!confirm("Reset all default-managed fields to the database defaults?\n\nAffected: creators, "+labels+".\n\nKept: title, identifier, publication year, subjects, descriptions, related items, checksums and validations.")) return;
  applyDefaultsToPayload(editModel); markDirty(); renderDetail();
  toast("Fields reset to defaults — Save entry to commit","ok");
}
function metaChanged(e){
  if(!editMeta) return false;
  return editMeta.status!==e.status
    || (editMeta.landingPage||"")!==(e.landingPage||"")
    || canonical((editMeta.domains||[]).slice().sort())!==canonical((e.domains||[]).slice().sort());
}
function saveEntry(){
  const e=findEntry(selectedId); if(!e) return;
  const errs=validate(editModel,CIE_SCHEMA);
  if(errs.length){ if(!confirm("The entry has "+errs.length+" schema issue(s):\n\n"+errs.slice(0,10).join("\n")+(errs.length>10?"\n…":"")+"\n\nSave anyway?")) return; }
  const curDoi=editModel.identifier&&editModel.identifier.identifier;
  if(curDoi && DB.entries.some(x=>x.entryId!==e.entryId && entryDoi(x)===curDoi)){
    if(!confirm("Another entry already uses this DOI:\n"+curDoi+"\n\nDOIs must be unique. Save anyway (the database will flag it as a duplicate to fix)?")) return;
  }
  const patch=contentDiff(e.payload,editModel);
  const meta=metaChanged(e);
  if(patch.length===0 && !meta){ toast("No changes to save"); editDirty=false; renderDetail(); return; }
  // payload changes are versioned in history (with a comment); envelope changes are not
  if(patch.length){
    const comment=prompt("Change comment (what changed and why):","");
    if(comment===null) return; // cancelled
    commitEdit(e,editModel,comment);
  }
  if(meta){
    e.status=editMeta.status; e.domains=clone(editMeta.domains); e.landingPage=editMeta.landingPage||"";
    if(!patch.length){ e.audit.modifiedBy=currentUser(); e.audit.modifiedDate=nowISO(); }
  }
  resetEditMeta(e); editDirty=false; persist(); renderList(); renderDetail();
  toast(patch.length?("Saved rev "+e.rev):"Saved entry changes","ok");
}
function deleteEntry(e){
  if(!confirm(`Delete entry "${entryTitle(e)}" (${entryDoi(e)})?\nThis removes it from the database.`)) return;
  DB.entries=DB.entries.filter(x=>x.entryId!==e.entryId);
  if(selectedId===e.entryId){ selectedId=null; editModel=null; editDirty=false; }
  persist(); renderList(); renderDetail(); toast("Entry deleted");
}
function duplicateEntry(e){
  const doi=generateDoi();
  const p=clone(e.payload);
  if(p.identifier) p.identifier.identifier=doi;
  if(p.titles&&p.titles[0]) p.titles[0].title=(p.titles[0].title||"")+" (copy)";
  const ne=createEntry(p,{status:"draft",domains:clone(e.domains||[]),landingPage:e.landingPage||"",comment:"Duplicated from "+entryDoi(e)});
  DB.entries.push(ne); persist(); selectEntry(ne.entryId); toast("Duplicated as new draft","ok");
}

let suppressDbTouch=false; // set while loading a file so its stored lastModified* is preserved
function persist(){
  if(!DB) return;
  DB.generatedAt=nowISO();
  if(!suppressDbTouch){ DB.lastModifiedDate=DB.generatedAt; DB.lastModifiedBy=currentUser(); }
  DB.baseHash=computeDbBaseHash(DB);
  try{ localStorage.setItem(APP.LS_DB, JSON.stringify(DB)); }catch(e){ /* quota */ }
}
function loadWorkingCopy(){
  try{ const s=localStorage.getItem(APP.LS_DB); if(s){ DB=migrateDb(JSON.parse(s)); lastLoadedBaseHash=DB.baseHash; return true; } }catch(e){}

}
const hasFSA = ("showOpenFilePicker" in window) && ("showSaveFilePicker" in window);

      // a single DataCite file imported here must not become the save target.
      dbFileHandle = (loadDbFromText(text)==="db") ? h : null;
    }catch(e){ if(e.name!=="AbortError") toast("Open failed: "+e.message,"err"); }
  }else{

/* returns "db" | "datacite" | null (unrecognised/invalid) */
function loadDbFromText(text){
  let obj; try{ obj=JSON.parse(text); }catch(e){ toast("Not valid JSON: "+e.message,"err"); return null; }
  // is this an aggregate DB or a single DataCite metadata file?
  if(obj && obj.dbSchemaName===APP.DB_SCHEMA_NAME){
    DB=migrateDb(obj); markSaved(computeDbBaseHash(DB)); selectedId=null; editModel=null; editDirty=false;
    suppressDbTouch=true; persist(); suppressDbTouch=false; // preserve the file's own lastModified* on open
    refreshDomainFilter(); renderList(); renderDetail(); toast("Database loaded — "+DB.entries.length+" entries","ok");
    return "db";
  }else if(obj && obj.schemaName===APP.CIE_SCHEMA_NAME){
    if(!DB) DB=newDB();
    importDataCiteObjects([obj]);
    return "datacite";
  }else{
    toast("Unrecognised file (neither CIEmetaDB nor CIEmetaDigitalProduct)","err");
    return null;
  }
}
function migrateDb(obj){
  obj.domains=obj.domains||clone(DEFAULT_DOMAINS);
  if(obj.title==null) obj.title="";
  if(obj.description==null) obj.description="";
  if(obj.lastModifiedDate==null) obj.lastModifiedDate=obj.generatedAt||nowISO();
  if(obj.lastModifiedBy==null) obj.lastModifiedBy="";
  obj.defaults=Object.assign(clone(DEFAULT_VALUES), obj.defaults||{}); // seed/fill missing default keys
  obj.entries=(obj.entries||[]).map(e=>{
    e.domains=e.domains||[]; if(e.landingPage==null) e.landingPage=""; e.history=e.history||[{rev:e.rev||1,by:"import",date:e.audit?e.audit.modifiedDate:nowISO(),comment:"Imported",baseHash:null,patch:diffPatch({},e.payload,"")}];
    if(e.contentHash==null) e.contentHash=contentHash(e.payload);
    if(e.rev==null) e.rev=e.history.length;
    if(e.payload && e.payload.metadataRevision==null) e.payload.metadataRevision=e.rev; // backfill metadata-file revision
    return e;
  });
  return obj;
}

/* import individual DataCite metadata files as new entries, checking DOI conflicts */
function importDataCiteObjects(objs){
  const byDoi=new Map(); DB.entries.forEach(e=>{ const d=entryDoi(e); if(d) byDoi.set(d,e); });
  const conflicts=[]; let added=0, noId=0;
  for(const o of objs){
    const doi=o&&o.identifier&&o.identifier.identifier;
    if(!doi){ noId++; }
    if(doi && byDoi.has(doi)){ conflicts.push({inc:o, existing:byDoi.get(doi), doi}); continue; } // DOI already present (DB or earlier in this batch)
    const e=createEntry(o,{status:"published",comment:"Imported from DataCite file"});
    DB.entries.push(e); added++;
    if(doi) byDoi.set(doi,e);
  }
  persist(); refreshDomainFilter(); renderList();
  if(noId) toast(`${noId} imported file(s) had no DOI identifier`,"err");
  if(conflicts.length) openImportConflictDialog(conflicts, added);
  else toast(`Imported ${added} DataCite file(s) as entries`,"ok");
}

/* ============================================================================
   concurrency: optimistic per-entry merge
   ==========================================================================*/
function mergeDb(incoming, onComplete){
  if(!DB){ DB=incoming; persist(); refreshDomainFilter(); renderList(); if(onComplete) onComplete(); return; }
  const mine=new Map(DB.entries.map(e=>[e.entryId,e]));
  const byDoi=new Map(); DB.entries.forEach(e=>{ const d=entryDoi(e); if(d) byDoi.set(d,e); });
  const conflicts=[]; let autoMerged=0, addedNew=0;
  for(const inc of incoming.entries){
    const cur=mine.get(inc.entryId);
    if(!cur){
      const d=entryDoi(inc);
      if(d && byDoi.has(d)){ conflicts.push({cur:byDoi.get(d), inc}); continue; } // same DOI, different entryId → conflict
      DB.entries.push(inc); addedNew++; if(d) byDoi.set(d,inc); continue;
    }
    if(cur.contentHash===inc.contentHash){ /* identical, keep higher history */ if(inc.history.length>cur.history.length){ cur.history=inc.history; cur.rev=inc.rev; } continue; }
    // diverged: determine common ancestor by rev/history baseHash
    const curBase=cur.history.length?cur.history[cur.history.length-1].baseHash:null;
    const incBase=inc.history.length?inc.history[inc.history.length-1].baseHash:null;
    // fast-forward: if incoming's history contains cur's contentHash as an ancestor
    if(historyContainsHash(inc, cur.contentHash)){ replaceEntry(cur, inc); autoMerged++; continue; }
    if(historyContainsHash(cur, inc.contentHash)){ autoMerged++; continue; } // mine already ahead
    conflicts.push({cur, inc});
  }
  persist(); refreshDomainFilter(); renderList();
  if(conflicts.length){ openConflictDialog(conflicts, autoMerged, addedNew, onComplete); }
  else { toast(`Merged: ${addedNew} new, ${autoMerged} updated, 0 conflicts`,"ok"); if(onComplete) onComplete(); }
}
function historyContainsHash(entry, hash){
  // reconstruct each revision and compare contentHash
  for(let r=1;r<=entry.history.length;r++){
    const doc=reconstruct(entry.history,r);
    if(contentHash(doc)===hash) return true;
  }
  return false;
}
function replaceEntry(cur, inc){ Object.assign(cur, inc); }

function openConflictDialog(conflicts, autoMerged, addedNew, onComplete){
  let i=0; const resolutions=[];
  const body=document.createElement("div");
  const nav=document.createElement("p"); nav.className="hint";
  body.appendChild(nav);
  const area=document.createElement("div"); body.appendChild(area);
  function paint(){
    const {cur,inc}=conflicts[i];
    nav.textContent=`Conflict ${i+1} of ${conflicts.length} — entry ${entryDoi(cur)} "${entryTitle(cur)}" was changed on both sides.`;
    area.innerHTML="";
    const cols=document.createElement("div"); cols.className="cols2";
    const mineBox=sideBox("Mine (current)",cur,"mine");
    const theirsBox=sideBox("Theirs (incoming)",inc,"theirs");
    cols.appendChild(mineBox); cols.appendChild(theirsBox); area.appendChild(cols);
    const pick=document.createElement("div"); pick.style.marginTop="10px"; pick.style.display="flex"; pick.style.gap="8px";
    pick.appendChild(mkBtn("Keep mine","ghost",()=>{ resolutions[i]="mine"; next(); }));
    pick.appendChild(mkBtn("Take theirs","ghost",()=>{ resolutions[i]="theirs"; next(); }));
    pick.appendChild(mkBtn("Keep both (theirs as new draft)","ghost",()=>{ resolutions[i]="both"; next(); }));
    area.appendChild(pick);
  }
  function sideBox(title,entry,cls){
    const d=document.createElement("div"); d.className="conflict";
    d.innerHTML=`<h4>${title} — rev ${entry.rev}, by ${esc(entry.audit.modifiedBy)} @ ${esc((entry.audit.modifiedDate||"").slice(0,19).replace("T"," "))}</h4>`;
    const s=document.createElement("div"); s.className="side"; const pre=document.createElement("pre");
    pre.textContent=JSON.stringify(entry.payload,null,1); s.appendChild(pre); d.appendChild(s);
    return d;
  }
  function next(){ i++; if(i>=conflicts.length) finish(); else paint(); }
  function finish(){
    conflicts.forEach((c,idx)=>{
      const r=resolutions[idx]||"mine";
      if(r==="theirs") replaceEntry(c.cur, c.inc);
      else if(r==="both"){ const dup=clone(c.inc); dup.entryId=uuid(); dup.status="draft"; dup.audit.modifiedComment="Imported copy (conflict: kept both)"; if(dup.payload.titles&&dup.payload.titles[0]) dup.payload.titles[0].title=(dup.payload.titles[0].title||"")+" (incoming copy)"; DB.entries.push(dup); }
      // "mine" → nothing
    });
    persist(); refreshDomainFilter(); renderList(); renderDetail(); closeModal();
    toast(`Merge complete: ${addedNew} new, ${autoMerged} auto-updated, ${conflicts.length} resolved`,"ok");
    if(onComplete) onComplete();
  }
  paint();
  modal("Resolve merge conflicts",body,[mkBtn("Cancel merge","ghost",()=>{ closeModal(); toast("Merge cancelled for remaining conflicts"); })]);
}

function download(filename, text, mime){
  const blob=new Blob([text],{type:mime||"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
/* write the whole DB to a File System Access handle */
async function writeText(handle, db){
  const w=await handle.createWritable(); await w.write(JSON.stringify(db,null,2)); await w.close();
}
/* pick a new file, write to it, and adopt it as the current handle (Save As) */
async function saveDbAs(){
  const handle=await window.showSaveFilePicker({
    suggestedName:(dbFileHandle&&dbFileHandle.name)||"CIEmetaDB.json",
    types:[{description:"CIE metadatabase JSON",accept:{"application/json":[".json"]}}]});
  await writeText(handle, DB);
  dbFileHandle=handle; markSaved(DB.baseHash);
  renderList(); toast("Saved to "+handle.name,"ok");
}
/* Save to the loaded file, detecting parallel changes first (checkConflicts).
   If the on-disk file changed since we loaded it, merge the on-disk version in
   (reusing the conflict-resolution UI) and write the merged result. */
async function saveToHandle(handle, checkConflicts){
  if(checkConflicts && lastLoadedBaseHash){
    let onDisk=null;
    try{ const f=await handle.getFile(); onDisk=migrateDb(JSON.parse(await f.text())); }
    catch(e){ onDisk=null; } // unreadable/deleted → treat as no parallel change, overwrite
    if(onDisk && onDisk.dbSchemaName===APP.DB_SCHEMA_NAME && computeDbBaseHash(onDisk)!==lastLoadedBaseHash){
      toast("File changed on disk by someone else — merging…","warn");
      // Merge on-disk (theirs) into our in-memory DB (mine); write once resolved.
      mergeDb(onDisk, async ()=>{
        try{ await writeText(handle, DB); markSaved(DB.baseHash); renderList(); toast("Merged and saved to "+handle.name,"ok"); }
        catch(e){ toast("Save after merge failed: "+e.message,"err"); }
      });
      return;
    }
  }
  await writeText(handle, DB);
  markSaved(DB.baseHash); renderList(); toast("Saved to "+handle.name,"ok");
}
async function saveDb(saveAs){
  if(!DB) return;
  persist();
  if(hasFSA){
    try{
      if(saveAs || !dbFileHandle) await saveDbAs();   // Save As, or first save of a handle-less DB
      else await saveToHandle(dbFileHandle, true);     // Save → overwrite loaded file (conflict-checked)
    }catch(e){ if(e.name==="AbortError") return; toast("Save failed: "+e.message,"err"); }
    return;
  }
  // No File System Access API (Firefox/Safari): cannot overwrite or detect parallel changes.
  download("CIEmetaDB.json", JSON.stringify(DB,null,2));
  markSaved(DB.baseHash); renderList();
  toast("Copy downloaded — this browser can't overwrite files or detect parallel edits. Use a Chromium browser for in-place save.","warn");
}
/* export entries as individual DataCite files (strip envelope) */
function exportDataCiteFiles(entries){
  entries=entries||DB.entries;
  if(entries.length===1){
    const e=entries[0]; const base=entryFilename(e)||sanitize(entryTitle(e));
    const fn=base.endsWith(".csv")?base+"_metadata.json":base+".csv_metadata.json";
    download(fn, JSON.stringify(e.payload,null,"\t"));
    toast("Exported "+fn,"ok"); return;
  }
  // multiple → offer as separate downloads
  if(!confirm(`Export ${entries.length} metadata (DataCite) files as separate downloads?`)) return;
  let n=0;
  const step=()=>{ if(n>=entries.length){ toast("Exported "+entries.length+" files","ok"); return; }
    const e=entries[n++]; const base=entryFilename(e)||sanitize(entryTitle(e));
    const fn=base.endsWith(".csv")?base+"_metadata.json":base+".csv_metadata.json";
    download(fn, JSON.stringify(e.payload,null,"\t")); setTimeout(step,250); };
  step();
}
function sanitize(s){ return String(s).replace(/[^\w.-]+/g,"_").slice(0,80); }

/* ============================================================================
   Crossref XML export (DOI-registration deposit, Crossref schema 5.3.1)
   ==========================================================================*/
/* Map DataCite relationType -> Crossref relations.xsd relation.
   work:"inter" => <inter_work_relation>, "intra" => <intra_work_relation>.
   relationType values not listed here have no Crossref equivalent and are
   skipped (and reported): IsDescribedBy, Describes, HasMetadata, IsMetadataFor,
   IsPublishedIn. Adjust the mapping here if the desired relation differs. */
const CROSSREF_RELATION_MAP = {
  IsPartOf:{type:"isPartOf",work:"inter"},
  HasPart:{type:"hasPart",work:"inter"},
  References:{type:"references",work:"inter"},
  IsReferencedBy:{type:"isReferencedBy",work:"inter"},
  Cites:{type:"references",work:"inter"},
  IsCitedBy:{type:"isReferencedBy",work:"inter"},
  IsDerivedFrom:{type:"isDerivedFrom",work:"inter"},
  IsSourceOf:{type:"hasDerivation",work:"inter"},
  IsDocumentedBy:{type:"isDocumentedBy",work:"inter"},
  Documents:{type:"documents",work:"inter"},
  IsSupplementTo:{type:"isSupplementTo",work:"inter"},
  IsSupplementedBy:{type:"isSupplementedBy",work:"inter"},
  IsContinuedBy:{type:"isContinuedBy",work:"inter"},
  Continues:{type:"continues",work:"inter"},
  IsCompiledBy:{type:"isCompiledBy",work:"inter"},
  Compiles:{type:"compiles",work:"inter"},
  IsRequiredBy:{type:"isRequiredBy",work:"inter"},
  Requires:{type:"requires",work:"inter"},
  IsReviewedBy:{type:"hasReview",work:"inter"},
  Reviews:{type:"isReviewOf",work:"inter"},
  IsVersionOf:{type:"isVersionOf",work:"intra"},
  HasVersion:{type:"hasVersion",work:"intra"},
  IsVariantFormOf:{type:"isVariantFormOf",work:"intra"},
  IsOriginalFormOf:{type:"isOriginalFormOf",work:"intra"},
  IsIdenticalTo:{type:"isIdenticalTo",work:"intra"},
  IsNewVersionOf:{type:"replaces",work:"intra"},
  IsPreviousVersionOf:{type:"isReplacedBy",work:"intra"},
  Obsoletes:{type:"replaces",work:"intra"},
  IsObsoletedBy:{type:"isReplacedBy",work:"intra"}
};
/* DataCite relatedItemIdentifierType -> Crossref relations identifier-type */
const CROSSREF_IDTYPE_MAP = { DOI:"doi", ISSN:"issn", ISBN:"isbn", URL:"uri", PURL:"purl", PMID:"pmid", arXiv:"arxiv" };
function crossrefIdType(datIdType, value){
  if(datIdType && CROSSREF_IDTYPE_MAP[datIdType]) return CROSSREF_IDTYPE_MAP[datIdType];
  if(/^10\.\d/.test(value||"")) return "doi";
  return "uri";
}
function crossrefTimestamp(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  return ""+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
}
/* <contributors> block (reused for database_metadata and dataset); ind = indent of <contributors> */
function crossrefContributorLines(creators, ind){
  const in2=ind+"  ", in3=ind+"    ", L=[ind+"<contributors>"];
  creators.forEach((c,i)=>{
    L.push(in2+`<person_name sequence="${i===0?"first":"additional"}" contributor_role="author">`);
    if(c.nameType==="Personal" && (c.givenName||c.familyName)){
      if(c.givenName) L.push(in3+`<given_name>${esc(c.givenName)}</given_name>`);
      L.push(in3+`<surname>${esc(c.familyName||c.name||"")}</surname>`);
    } else {
      L.push(in3+`<surname>${esc(c.name||"")}</surname>`); // organisation name goes in <surname> (matches example files)
    }
    L.push(in2+"</person_name>");
  });
  L.push(ind+"</contributors>");
  return L;
}
/* Build a Crossref deposit XML for one entry. Returns {xml, batchId, skipped}. */
function buildCrossrefXml(e, landingPage){
  const d=defaults(), p=e.payload||{};
  const ts=crossrefTimestamp();
  const base=(entryFilename(e)||sanitize(entryTitle(e))||"CIEdataset").replace(/\.csv$/i,"");
  const batchId=base+"("+ts+")";
  const title=(p.titles&&p.titles[0]&&p.titles[0].title)||"";
  const desc=(p.descriptions&&p.descriptions[0]&&p.descriptions[0].description)||"";
  const mime=(p.formats&&p.formats[0])||d.format||"text/csv";
  const creators=(p.creators&&p.creators.length)?p.creators
    :[{name:d.creatorName||d.crRegistrant||"",nameType:d.creatorNameType||"Organizational"}];

  // relations
  const skipped=[], relLines=[];
  (p.relatedItems||[]).forEach(ri=>{
    const rt=ri.relationType||"", idval=(ri.relatedItemIdentifier||"").trim(), m=CROSSREF_RELATION_MAP[rt];
    if(!m || !idval){ if(idval && !m) skipped.push(rt||"(none)"); return; }
    const idtype=crossrefIdType(ri.relatedItemIdentifierType, idval);
    const tag=(m.work==="intra")?"intra_work_relation":"inter_work_relation";
    relLines.push("          <related_item>");
    relLines.push("            <description>Relation dataset</description>");
    relLines.push(`            <${tag} relationship-type="${esc(m.type)}" identifier-type="${esc(idtype)}">${esc(idval)}</${tag}>`);
    relLines.push("          </related_item>");
  });

  const L=[];
  L.push('<?xml version="1.0" encoding="UTF-8"?>');
  L.push('<doi_batch xsi:schemaLocation="http://www.crossref.org/schema/5.3.1 http://data.crossref.org/schemas/crossref5.3.1.xsd" version="5.3.1" xmlns="http://www.crossref.org/schema/5.3.1" xmlns:jats="http://www.ncbi.nlm.nih.gov/JATS1" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">');
  L.push("  <head>");
  L.push(`    <doi_batch_id>${esc(batchId)}</doi_batch_id>`);
  L.push(`    <timestamp>${ts}</timestamp>`);
  L.push("    <depositor>");
  L.push(`      <depositor_name>${esc(d.crDepositorName||"")}</depositor_name>`);
  L.push(`      <email_address>${esc(d.crDepositorEmail||"")}</email_address>`);
  L.push("    </depositor>");
  L.push(`    <registrant>${esc(d.crRegistrant||"")}</registrant>`);
  L.push("  </head>");
  L.push("  <body>");
  L.push("    <database>");
  L.push("      <database_metadata>");
  crossrefContributorLines(creators, "        ").forEach(x=>L.push(x));
  L.push("        <titles>");
  L.push(`          <title>${esc(d.crDatabaseTitle||"")}</title>`);
  L.push("        </titles>");
  L.push("        <publisher>");
  L.push(`          <publisher_name>${esc(d.crPublisherName||"")}</publisher_name>`);
  L.push("        </publisher>");
  L.push("        <institution>");
  L.push(`          <institution_name>${esc(d.crInstitutionName||"")}</institution_name>`);
  L.push(`          <institution_acronym>${esc(d.crInstitutionAcronym||"")}</institution_acronym>`);
  L.push(`          <institution_place>${esc(d.crInstitutionPlace||"")}</institution_place>`);
  L.push(`          <institution_department>${esc(d.crInstitutionDepartment||"")}</institution_department>`);
  L.push("        </institution>");
  L.push("      </database_metadata>");
  L.push('      <dataset dataset_type="collection">');
  crossrefContributorLines(creators, "        ").forEach(x=>L.push(x));
  L.push("        <titles>");
  L.push(`          <title>${esc(title)}</title>`);
  L.push("        </titles>");
  L.push(`        <description>${esc(desc)}</description>`);
  L.push(`        <format mime_type="${esc(mime)}"/>`);
  if(relLines.length){
    L.push('        <program xmlns="http://www.crossref.org/relations.xsd">');
    relLines.forEach(x=>L.push(x));
    L.push("        </program>");
  }
  L.push("        <doi_data>");
  L.push(`          <doi>${esc(entryDoi(e)||"")}</doi>`);
  L.push(`          <resource>${esc(landingPage||"")}</resource>`);
  L.push("        </doi_data>");
  L.push("      </dataset>");
  L.push("    </database>");
  L.push("  </body>");
  L.push("</doi_batch>");
  return {xml:L.join("\n")+"\n", batchId, skipped};
}
/* Export the selected entry as Crossref XML, prompting for a landing page if missing. */
function exportCrossrefXml(e){
  if(!e) return;
  const lp=(e.landingPage||"").trim();
  if(!lp){ openLandingPageDialog(e, url=>doCrossrefExport(e,url)); return; }
  doCrossrefExport(e, lp);
}
function doCrossrefExport(e, landingPage){
  if(!entryDoi(e)){ if(!confirm("This entry has no DOI. Export Crossref XML anyway (with an empty <doi>)?")) return; }
  const {xml, batchId, skipped}=buildCrossrefXml(e, landingPage);
  download(batchId+".xml", xml, "application/xml");
  if(skipped.length) toast("Exported "+batchId+".xml — skipped unmapped relation(s): "+[...new Set(skipped)].join(", "),"err");
  else toast("Exported "+batchId+".xml","ok");
}
function openLandingPageDialog(e, onOk){
  const body=document.createElement("div");
  const hint=document.createElement("div"); hint.className="hint";
  hint.textContent="Crossref needs a landing-page URL for the DOI <resource>. It will be saved on this entry.";
  body.appendChild(hint);

  body.appendChild(field("DOI landing page (resource URL)", i));

    const url=i.value.trim();

    e.landingPage=url;
    if(selectedId===e.entryId && editMeta) editMeta.landingPage=url;
    persist(); renderDetail(); closeModal(); onOk(url);
  });
  modal("DOI landing page", body, [mkBtn("Cancel","ghost",closeModal), ok]);
}

/* true when the open DB has changes not yet written to its file (baseHash drifted

/* record that `hash` is now written to disk, so the next-launch "restore unsaved

    <ul>
      <li>Deposit-header and database-level fields (<b>depositor</b> name/email, <b>registrant</b>,
        <b>database title</b>, <b>publisher</b>, <b>institution</b>) come from
        <b>Edit defaults…</b> — set them once for your organisation.</li>
      <li>DataCite <code>relationType</code>s on related items are mapped to Crossref
        <code>inter_work_relation</code> / <code>intra_work_relation</code> (per the Crossref
        relations schema). Relations with no Crossref equivalent (e.g. <code>Describes</code>,
        <code>HasMetadata</code>, <code>IsPublishedIn</code>) are skipped and reported in a message.</li>
      <li>The file is named <code>&lt;dataset&gt;(&lt;timestamp&gt;).xml</code>.</li>
    </ul>
    <p style="margin:4px 0"><b>Validate the generated XML</b> with the Crossref deposit parser:<br>
      <a href="https://data.crossref.org/reports/parser.html" target="_blank" rel="noopener noreferrer">https://data.crossref.org/reports/parser.html</a></p>

    <h4>Reference links</h4>
    <ul>
      <li>Crossref schema: <a href="https://data.crossref.org/schemas/crossref5.3.1.xsd" target="_blank" rel="noopener noreferrer">crossref5.3.1.xsd</a>,
        <a href="https://data.crossref.org/schemas/common5.3.1.xsd" target="_blank" rel="noopener noreferrer">common5.3.1.xsd</a></li>
      <li>Crossref relations: <a href="https://data.crossref.org/schemas/relations.xsd" target="_blank" rel="noopener noreferrer">relations.xsd</a></li>
      <li>CIE data tables: <a href="https://cie.co.at/data-tables" target="_blank" rel="noopener noreferrer">cie.co.at/data-tables</a></li>
      <li>DOI resolver: <a href="https://doi.org" target="_blank" rel="noopener noreferrer">doi.org</a></li>
    </ul>
    <p class="kv" style="margin-bottom:0">Full documentation: see <code>README.md</code> next to this file.</p>`;
  modal("Help & information", body, [mkBtn("Close","sec",closeModal)]);
}

function wire(){
  el("appVersion").textContent="v"+APP.VERSION;
  ensureUser(false);
  el("btnUser").onclick=()=>ensureUser(true);
  el("btnNewDb").onclick=()=>{ if(DB && !confirm("Start a new empty database? Unsaved changes to the working copy will be replaced.")) return; DB=newDB(); dbFileHandle=null; clearSavedMarker(); selectedId=null; editModel=null; editDirty=false; persist(); refreshDomainFilter(); renderList(); renderDetail(); toast("New database created — use Save to choose a file","ok"); };
  el("btnOpen").onclick=openDbFile;
  el("btnImport").onclick=openImportDialog;
  el("btnDbInfo").onclick=openDbInfoDialog;
  el("btnSave").onclick=()=>saveDb(false);
  el("btnSaveAs").onclick=()=>saveDb(true);
  el("btnNewEntry").onclick=()=>{ if(!DB) return; openNewEntryDialog(); };
  el("btnDomains").onclick=openDomainsDialog;
  el("btnDefaults").onclick=()=>{ if(!DB) return; openDefaultsDialog(); };
  el("btnExportDataCite").onclick=()=>{ if(DB&&DB.entries.length) exportDataCiteFiles(DB.entries); else toast("No entries to export"); };
  el("btnHelp").onclick=openHelpDialog;
  el("search").oninput=renderList;
  el("filterDomain").onchange=renderList;
  el("filterStatus").onchange=renderList;
  el("filterPublication").onchange=renderList;
  el("sortBy").onchange=()=>{ sort.key=el("sortBy").value; sort.dir=1; renderList(); };
  el("sortDir").onclick=()=>{ sort.dir*=-1; renderList(); };
  document.querySelectorAll("table.entries th").forEach(th=>{
    th.onclick=()=>{ const k=th.dataset.sort; if(sort.key===k) sort.dir*=-1; else{ sort.key=k; sort.dir=1; } renderList(); };
  });
  window.addEventListener("beforeunload",(e)=>{ if(editDirty || dbUnsaved()){ e.preventDefault(); e.returnValue=""; } });

  // Start with no database open. Offer to restore an unsaved working copy if one
  // remains from a previous session (recovery safety net, not auto-open). Compare
  // against the last-saved marker so a working copy that was already written to
  // its file (nothing left to recover) doesn't trigger a false prompt every reload.
  DB=null;
  try{
    const wc=localStorage.getItem(APP.LS_DB);
    if(wc){
      const wcHash=computeDbBaseHash(migrateDb(JSON.parse(wc)));
      const savedHash=localStorage.getItem(APP.LS_SAVED_HASH);
      if(wcHash!==savedHash &&
         confirm("Unsaved work from a previous session was found. Restore it?\n\n(It has no linked file — the first Save will ask where to save.)")){
        loadWorkingCopy();
      }
    }
  }catch(e){}
  refreshDomainFilter(); renderList(); renderDetail();
  if(!hasFSA){ el("btnSaveAs").title="File System Access API not available — downloads a file"; }
}
let toastTimer=null;
function toast(msg,kind){ const t=el("toast"); t.textContent=msg; t.className="toast show "+(kind||""); clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.className="toast "+(kind||""); },2600); }

document.addEventListener("DOMContentLoaded",wire);
</script>
</body>
</html>
